<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="360" fill="#EEF2FF"/>
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">Email Triage Pipeline</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#64748B">Fetch → Classify → Route → Act</text>

  <!-- Fetch -->
  <rect x="50" y="120" width="160" height="100" rx="8" fill="#fff" stroke="#4F46E5" stroke-width="2"/>
  <text x="130" y="155" text-anchor="middle" font-size="18" font-weight="700" fill="#4F46E5">Fetch</text>
  <text x="130" y="178" text-anchor="middle" font-size="11" fill="#64748B">Gmail Pub/Sub</text>
  <text x="130" y="192" text-anchor="middle" font-size="11" fill="#64748B">Graph webhook</text>
  <text x="130" y="206" text-anchor="middle" font-size="11" fill="#64748B">IMAP IDLE</text>

  <path d="M 220 170 L 260 170" stroke="#06B6D4" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Classify -->
  <rect x="270" y="120" width="160" height="100" rx="8" fill="#fff" stroke="#4F46E5" stroke-width="2"/>
  <text x="350" y="155" text-anchor="middle" font-size="18" font-weight="700" fill="#4F46E5">Classify</text>
  <text x="350" y="178" text-anchor="middle" font-size="11" fill="#64748B">Local LLM (Ollama)</text>
  <text x="350" y="192" text-anchor="middle" font-size="11" fill="#64748B">+ rules engine</text>
  <text x="350" y="206" text-anchor="middle" font-size="11" fill="#64748B">+ Redis cache</text>

  <path d="M 440 170 L 480 170" stroke="#06B6D4" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Route -->
  <rect x="490" y="120" width="160" height="100" rx="8" fill="#fff" stroke="#4F46E5" stroke-width="2"/>
  <text x="570" y="155" text-anchor="middle" font-size="18" font-weight="700" fill="#4F46E5">Route</text>
  <text x="570" y="178" text-anchor="middle" font-size="11" fill="#64748B">Per-account rules</text>
  <text x="570" y="192" text-anchor="middle" font-size="11" fill="#64748B">Per-folder overrides</text>
  <text x="570" y="206" text-anchor="middle" font-size="11" fill="#64748B">Watch rules</text>

  <path d="M 660 170 L 700 170" stroke="#06B6D4" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Act -->
  <rect x="710" y="120" width="160" height="100" rx="8" fill="#fff" stroke="#4F46E5" stroke-width="2"/>
  <text x="790" y="155" text-anchor="middle" font-size="18" font-weight="700" fill="#4F46E5">Act</text>
  <text x="790" y="178" text-anchor="middle" font-size="11" fill="#64748B">Draft reply</text>
  <text x="790" y="192" text-anchor="middle" font-size="11" fill="#64748B">Label / Move</text>
  <text x="790" y="206" text-anchor="middle" font-size="11" fill="#64748B">Notify / Escalate</text>

  <!-- Sovereign annotation -->
  <rect x="270" y="260" width="360" height="60" rx="6" fill="#0F172A"/>
  <text x="450" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#06B6D4">SOVEREIGN: Local LLM by default</text>
  <text x="450" y="305" text-anchor="middle" font-size="11" fill="#fff">Email content never leaves your network</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06B6D4"/>
    </marker>
  </defs>
</svg>
