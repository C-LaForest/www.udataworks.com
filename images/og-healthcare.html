<!DOCTYPE html>
<html>
<head><title>OG Image — Healthcare (Screenshot at 1200x630)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; }
.card {
  width: 1200px; height: 630px;
  background: linear-gradient(135deg, #0a2540, #174ea6);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: Arial, Helvetica, sans-serif; color: #fff;
  position: relative;
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 32px 32px;
}
h1 { font-size: 64px; font-weight: bold; margin-bottom: 16px; position: relative; }
h2 { font-size: 32px; font-weight: 400; color: #e3f0fa; margin-bottom: 32px; position: relative; }
.divider { width: 200px; height: 2px; background: #e3f0fa; opacity: 0.5; margin-bottom: 32px; position: relative; }
.tagline { font-size: 24px; color: #e3f0fa; opacity: 0.9; margin-bottom: 12px; position: relative; }
.subtitle { font-size: 20px; color: #e3f0fa; opacity: 0.7; margin-bottom: 48px; position: relative; }
.url { font-size: 18px; color: #e3f0fa; opacity: 0.5; position: relative; }
</style>
</head>
<body>
<div class="card">
  <h1>Craig LaForest</h1>
  <h2>Fractional CTO for Healthcare</h2>
  <div class="divider"></div>
  <div class="tagline">Clinical Systems &amp; AI-Driven Solutions</div>
  <div class="subtitle">EHR Integration | HIPAA Compliance | Infrastructure</div>
  <div class="url">www.udataworks.com</div>
</div>
</body>
</html>
