<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d62"/>
      <stop offset="100%" style="stop-color:#174ea6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="rgba(255,255,255,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Content -->
  <text x="600" y="220" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle">Craig LaForest</text>
  <text x="600" y="290" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#e3f0fa" text-anchor="middle">Fractional CTO</text>
  <line x1="500" y1="320" x2="700" y2="320" stroke="#e3f0fa" stroke-width="2" opacity="0.5"/>
  <text x="600" y="380" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#e3f0fa" text-anchor="middle" opacity="0.9">Medical Research | Healthcare | Gas Utilities</text>
  <text x="600" y="430" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#e3f0fa" text-anchor="middle" opacity="0.7">Strategic Technology Leadership &amp; Sovereign AI</text>
  <!-- URL -->
  <text x="600" y="560" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#e3f0fa" text-anchor="middle" opacity="0.5">www.udataworks.com</text>
</svg>
