<!DOCTYPE html>
<html>
<head><title>OG Image — Legal (Screenshot at 1200x630)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; }
.card {
  width: 1200px; height: 630px;
  background: linear-gradient(135deg, #3A2A20, #7B2D26);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: Georgia, 'Times New Roman', serif; color: #fff;
  position: relative;
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
    radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 48px 48px, 48px 48px, 24px 24px;
}
h1 { font-size: 64px; font-weight: bold; margin-bottom: 16px; position: relative; }
h2 { font-size: 32px; font-weight: 400; color: #F3EBE0; margin-bottom: 32px; position: relative; }
.divider { width: 200px; height: 2px; background: #C9A24B; opacity: 0.9; margin-bottom: 32px; position: relative; }
.tagline { font-size: 26px; color: #F3EBE0; margin-bottom: 12px; position: relative; }
.tagline strong { color: #C9A24B; font-weight: 700; }
.subtitle { font-size: 19px; color: #F3EBE0; opacity: 0.75; margin-bottom: 48px; position: relative; font-family: Arial, Helvetica, sans-serif; }
.url { font-size: 18px; color: #F3EBE0; opacity: 0.55; position: relative; font-family: Arial, Helvetica, sans-serif; }
</style>
</head>
<body>
<div class="card">
  <h1>Craig LaForest</h1>
  <h2>Fractional CTO for Law Firms &amp; Legal Departments</h2>
  <div class="divider"></div>
  <div class="tagline"><strong>Sovereign AI</strong> | Privilege | Confidentiality</div>
  <div class="subtitle">Keep privileged communications and work product inside your four walls</div>
  <div class="url">www.udataworks.com</div>
</div>
</body>
</html>
