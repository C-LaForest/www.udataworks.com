<!DOCTYPE html>
<html>
<head><title>OG Image — Gas Utility (Screenshot at 1200x630)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; }
.card {
  width: 1200px; height: 630px;
  background: linear-gradient(135deg, #1B365D, #2a5298);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: Arial, Helvetica, sans-serif; color: #fff;
  position: relative;
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(45deg, transparent, transparent 18px, rgba(255,255,255,0.03) 18px, rgba(255,255,255,0.03) 19.5px),
    repeating-linear-gradient(-45deg, transparent, transparent 18px, rgba(255,255,255,0.03) 18px, rgba(255,255,255,0.03) 19.5px);
}
h1 { font-size: 64px; font-weight: bold; margin-bottom: 16px; position: relative; }
h2 { font-size: 32px; font-weight: 400; color: #E8F1F5; margin-bottom: 32px; position: relative; }
.divider { width: 200px; height: 2px; background: #FF6B35; opacity: 0.7; margin-bottom: 32px; position: relative; }
.tagline { font-size: 24px; color: #E8F1F5; opacity: 0.9; margin-bottom: 12px; position: relative; }
.subtitle { font-size: 20px; color: #E8F1F5; opacity: 0.7; margin-bottom: 48px; position: relative; }
.url { font-size: 18px; color: #E8F1F5; opacity: 0.5; position: relative; }
</style>
</head>
<body>
<div class="card">
  <h1>Craig LaForest</h1>
  <h2>Fractional CTO for Gas Utilities</h2>
  <div class="divider"></div>
  <div class="tagline">SCADA Modernization &amp; Pipeline Safety</div>
  <div class="subtitle">Compliance | Operational Technology | AI Analytics</div>
  <div class="url">www.udataworks.com</div>
</div>
</body>
</html>
